name: Build & publish Docker image

# Builds the ShowTrackr app image (apps/web) and publishes it to the GitHub
# Container Registry (GHCR). No extra secrets to configure: the built-in
# GITHUB_TOKEN is used to authenticate against ghcr.io.
#
# Pull it on your server with:
#   docker pull ghcr.io/romainneup/showtrackr:latest

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    # Only rebuild when something that affects the image changes.
    paths:
      - 'apps/web/**'
      - 'packages/db/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.npmrc'
      - '.github/workflows/docker-image.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # metadata-action lowercases this automatically (GHCR requires lowercase).
  IMAGE_NAME: ${{ github.repository_owner }}/showtrackr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU + buildx enable multi-arch builds (amd64 for VPS, arm64 for Raspberry Pi).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build context is the pnpm workspace root (the repo root), as the Dockerfile requires.
          context: .
          file: ./apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
